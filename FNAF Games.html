    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF Trivia: The Big Four</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        #game-container {
            background-color: #1a1a1a;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 2px solid #333;
        }
        h1 { color: #ff0000; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 30px; }
        .question { font-size: 1.3rem; margin-bottom: 2rem; min-height: 4rem; color: #fff; }
        .options { display: grid; gap: 12px; }
        button {
            background-color: #2a2a2a;
            color: #ccc;
            border: 1px solid #444;
            padding: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
            font-family: inherit;
        }
        button:hover { background-color: #3a3a3a; border-color: #ff0000; color: #fff; }
        #score-display { margin-top: 20px; font-weight: bold; color: #555; }
        #feedback { margin-top: 15px; height: 1.5rem; font-weight: bold; text-transform: uppercase; }
        .hidden { display: none; }
        #restart-btn { background-color: #800; border-color: #f00; margin-top: 30px; color: white; width: 100%; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>FNaF Trivia</h1>
    
    <div id="quiz-box">
        <div id="question-text" class="question">Loading security feed...</div>
        <div id="options-container" class="options"></div>
        <div id="feedback"></div>
        <div id="score-display">Score: 0 / 10</div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>Shift Ended</h2>
        <p id="final-score" style="font-size: 1.5rem;"></p>
        <p id="rank-text"></p>
        <button id="restart-btn" onclick="location.reload()">REBOOT SYSTEM</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Which animatronic is the lead singer of the Freddy Fazbear Band?", a: ["Freddy", "Chica", "Bonnie", "Foxy"], correct: 0 },
        { q: "Who is known for hiding behind the curtains in Pirate Cove?", a: ["Freddy", "Bonnie", "Foxy", "Chica"], correct: 2 },
        { q: "Which character carries a pink cupcake named Mr. Cupcake?", a: ["Bonnie", "Chica", "Freddy", "Foxy"], correct: 1 },
        { q: "Who is the only animatronic from the main four that does NOT have eyebrows?", a: ["Freddy", "Foxy", "Chica", "Bonnie"], correct: 3 },
        { q: "In the first game, which animatronic usually leaves the stage first?", a: ["Bonnie", "Chica", "Freddy", "Foxy"], correct: 0 },
        { q: "Which character has a hook for a right hand and an eye patch?", a: ["Freddy", "Bonnie", "Foxy", "Chica"], correct: 2 },
        { q: "Who is the namesake and mascot of the entire pizzeria franchise?", a: ["Chica", "Freddy", "Bonnie", "Foxy"], correct: 1 },
        { q: "Which animatronic is famous for sprinting down the West Hallway toward your office?", a: ["Freddy", "Chica", "Bonnie", "Foxy"], correct: 3 },
        { q: "In FNaF 1, which character only attacks if your power runs out completely?", a: ["Foxy", "Freddy", "Bonnie", "Chica"], correct: 1 },
        { q: "Which character is often heard clanging pots and pans in the Kitchen?", a: ["Chica", "Bonnie", "Freddy", "Foxy"], correct: 0 }
    ];

    let currentIdx = 0;
    let score = 0;

    const qText = document.getElementById('question-text');
    const optCont = document.getElementById('options-container');
    const feedback = document.getElementById('feedback');
    const scoreDisp = document.getElementById('score-display');

    function loadQuestion() {
        if (currentIdx >= questions.length) {
            showResults();
            return;
        }
        
        feedback.innerText = "";
        const currentQ = questions[currentIdx];
        qText.innerText = `${currentIdx + 1}. ${currentQ.q}`;
        optCont.innerHTML = "";
        
        currentQ.a.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.innerText = option;
            btn.onclick = () => checkAnswer(i);
            optCont.appendChild(btn);
        });
    }

    function checkAnswer(choice) {
        const buttons = optCont.getElementsByTagName('button');
        for(let btn of buttons) btn.disabled = true; // Disable further clicks

        if (choice === questions[currentIdx].correct) {
            score++;
            feedback.style.color = "#00ff00";
            feedback.innerText = "Access Granted";
        } else {
            feedback.style.color = "#ff0000";
            feedback.innerText = "System Error: Wrong Unit";
        }
        
        scoreDisp.innerText = `Score: ${score} / 10`;
        currentIdx++;
        setTimeout(loadQuestion, 1200);
    }

    function showResults() {
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `Score: ${score} / 10`;
        
        let rank = "";
        if (score === 10) rank = "Status: Night Guard Pro";
        else if (score >= 7) rank = "Status: Survived the Week";
        else if (score >= 4) rank = "Status: Stuffed in a Suit";
        else rank = "Status: You didn't make it...";
        
        document.getElementById('rank-text').innerText = rank;
    }

    loadQuestion();
</script>

</body>
</html>
